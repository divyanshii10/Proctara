name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---- Lint & Type Check ----
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ---- Unit Tests ----
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: proctara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/proctara_test'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: cd apps/api && npx prisma migrate deploy
      - run: npm run test

  # ---- Build & Push Docker Images ----
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t proctara-api:${{ github.sha }} .

      - name: Build Web image
        run: docker build -f docker/web.Dockerfile -t proctara-web:${{ github.sha }} .

      # In production: push to ECR, deploy to ECS
      # - name: Push to ECR
      #   run: |
      #     aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
      #     docker push $ECR_REGISTRY/proctara-api:${{ github.sha }}
      #     docker push $ECR_REGISTRY/proctara-web:${{ github.sha }}
